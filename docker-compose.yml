version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    ports:
      - "8000:8000"

    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      VECTOR_DB_PATH: /app/data/vector_db

    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    ports:
      - "3000:3000"

    environment:
      VITE_API_URL: http://localhost:8000/api/v1

    depends_on:
      - backend